<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>ANVIT CARS - The Coolest Car Collection!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg1: #1a1a2e;
            --bg2: #16213e;
            --bg3: #0f3460;
            --text-dark: #1a1a2e;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, var(--bg1) 0%, var(--bg2) 50%, var(--bg3) 100%);
            position: relative;
            overflow-x: hidden;
            color: white;
        }

        .stars {
            position: fixed;
            inset: 0;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        .profile-corner {
            position: fixed;
            top: 16px;
            left: 16px;
            z-index: 120;
            display: flex;
            flex-direction: column;
            align-items: center;
            gap: 8px;
            text-decoration: none;
        }

        .profile-pic {
            width: 110px;
            height: auto;
            max-height: 155px;
            border-radius: 18px;
            border: 4px solid #FFD700;
            box-shadow: 0 10px 30px rgba(0,0,0,0.35);
            object-fit: contain;
            background: rgba(255,255,255,0.2);
            display: block;
        }

        .profile-label {
            background: rgba(255,255,255,0.15);
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255,255,255,0.25);
            color: white;
            padding: 6px 12px;
            border-radius: 999px;
            font-size: 14px;
            font-weight: bold;
            text-shadow: 0 1px 2px rgba(0,0,0,0.5);
        }

        header {
            background: linear-gradient(90deg, #FF0000, #FF6B00, #FFD700);
            padding: 30px 24px 34px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(255, 107, 0, 0.5);
            border-bottom: 5px solid #FFD700;
            z-index: 10;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 72px;
            font-weight: 900;
            color: var(--text-dark);
            text-shadow: 4px 4px 0px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 28px;
            color: var(--text-dark);
            font-weight: bold;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.3);
        }

        .button-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px 20px;
            position: relative;
            z-index: 10;
            flex-wrap: wrap;
        }

        button {
            padding: 22px 42px;
            font-size: 28px;
            font-weight: 900;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            font-family: 'Comic Sans MS', cursive;
            border: none;
        }

        button:hover {
            transform: scale(1.05) !important;
        }

        .btn-fastest, .btn-lowest {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border: 5px solid #7f8c8d;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-fastest.active {
            background: linear-gradient(135deg, #FF0000, #FF6B00);
            border: 5px solid #FFD700;
            box-shadow: 0 10px 40px rgba(255, 107, 0, 0.6);
            transform: scale(1.08);
        }

        .btn-lowest.active {
            background: linear-gradient(135deg, #00FFFF, #0066FF);
            border: 5px solid #FFD700;
            box-shadow: 0 10px 40px rgba(0, 255, 255, 0.6);
            transform: scale(1.08);
        }

        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            padding: 20px 60px 80px;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .car-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border-radius: 25px;
            padding: 30px;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: slideIn 0.6s ease-out backwards;
            min-height: 460px;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .car-card:hover {
            transform: translateY(-15px) scale(1.03);
        }

        .car-emoji {
            font-size: 120px;
            text-align: center;
            margin-bottom: 18px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .car-name {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin: 0 0 14px 0;
            text-transform: uppercase;
        }

        .car-stat {
            color: var(--text-dark);
            font-size: 24px;
            font-weight: 900;
            padding: 14px 20px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 14px;
        }

        .car-fact {
            font-size: 21px;
            color: white;
            text-align: center;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
            margin-bottom: 12px;
        }

        .car-description {
            font-size: 16px;
            line-height: 1.55;
            color: rgba(255,255,255,0.95);
            text-align: left;
            background: rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.15);
            border-radius: 18px;
            padding: 16px 18px;
            min-height: 120px;
        }

        .shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 3s infinite;
            pointer-events: none;
        }

        @keyframes shine {
            0% { left: -100%; }
            50%, 100% { left: 150%; }
        }

        .detail-view {
            display: none;
            position: fixed;
            inset: 0;
            z-index: 200;
            background: rgba(8, 10, 25, 0.92);
            backdrop-filter: blur(10px);
            padding: 24px;
            overflow-y: auto;
        }

        .detail-view.show {
            display: block;
        }

        .detail-card {
            max-width: 900px;
            margin: 40px auto;
            background: linear-gradient(135deg, rgba(255,255,255,0.12), rgba(255,255,255,0.06));
            border: 3px solid rgba(255,255,255,0.18);
            border-radius: 30px;
            padding: 28px;
            box-shadow: 0 20px 80px rgba(0,0,0,0.4);
            position: relative;
        }

        .detail-top {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            flex-wrap: wrap;
            margin-bottom: 18px;
        }

        .back-btn, .close-btn {
            border: none;
            background: linear-gradient(135deg, #ff6b00, #ff0000);
            color: white;
            font-size: 18px;
            font-weight: 800;
            padding: 14px 18px;
            border-radius: 14px;
            cursor: pointer;
            box-shadow: 0 10px 25px rgba(255, 85, 0, 0.35);
        }

        .close-btn {
            background: rgba(255,255,255,0.12);
            box-shadow: none;
        }

        .detail-hero {
            display: grid;
            grid-template-columns: 180px 1fr;
            gap: 22px;
            align-items: center;
        }

        .detail-icon {
            width: 180px;
            height: 180px;
            border-radius: 28px;
            display: grid;
            place-items: center;
            font-size: 110px;
            background: rgba(255,255,255,0.1);
            border: 2px solid rgba(255,255,255,0.18);
        }

        .detail-name {
            font-size: 44px;
            font-weight: 900;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .detail-stat {
            display: inline-block;
            margin-bottom: 14px;
            font-size: 24px;
            font-weight: 900;
            color: var(--text-dark);
            padding: 12px 18px;
            border-radius: 14px;
        }

        .detail-fact {
            font-size: 22px;
            font-weight: bold;
            margin-bottom: 12px;
        }

        .detail-desc {
            font-size: 18px;
            line-height: 1.7;
            color: rgba(255,255,255,0.95);
            background: rgba(0,0,0,0.18);
            border: 1px solid rgba(255,255,255,0.12);
            border-radius: 20px;
            padding: 18px;
            margin-top: 18px;
        }

        footer {
            background: linear-gradient(90deg, #FF0000, #FF6B00, #FFD700);
            padding: 30px;
            text-align: center;
            margin-top: 40px;
            border-top: 5px solid #FFD700;
            position: relative;
            z-index: 10;
        }

        .footer-title {
            font-size: 28px;
            font-weight: 900;
            color: var(--text-dark);
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.3);
        }

        .footer-subtitle {
            font-size: 22px;
            color: var(--text-dark);
            margin-top: 10px;
            font-weight: bold;
        }

        @media (max-width: 768px) {
            .profile-corner {
                top: 10px;
                left: 10px;
            }

            .profile-pic {
                width: 78px;
                height: auto;
                max-height: 110px;
            }

            .profile-label {
                font-size: 12px;
                padding: 4px 10px;
            }

            h1 {
                font-size: 48px;
            }

            .tagline {
                font-size: 20px;
            }

            button {
                font-size: 20px;
                padding: 18px 28px;
            }

            .cars-grid {
                grid-template-columns: 1fr;
                padding: 20px;
            }

            .detail-hero {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .detail-icon {
                margin: 0 auto;
            }

            .detail-name {
                font-size: 34px;
            }

            .detail-view {
                padding: 14px;
            }
        }

        html {
            scroll-behavior: smooth;
        }

        .landing-section {
            max-width: 1600px;
            margin: 22px auto 0;
            padding: 0 20px;
            position: relative;
            z-index: 10;
        }

        .landing-card {
            border-radius: 28px;
            overflow: hidden;
            background: linear-gradient(135deg, rgba(255,255,255,0.08), rgba(255,255,255,0.04));
            border: 2px solid rgba(255,255,255,0.16);
            box-shadow: 0 20px 60px rgba(0,0,0,0.28);
        }

        .landing-card img {
            width: 100%;
            display: block;
            height: auto;
            object-fit: contain;
            background: #040814;
        }

        .landing-actions {
            display: flex;
            justify-content: center;
            margin-top: 18px;
        }

        .explore-home-btn {
            border: none;
            padding: 18px 28px;
            border-radius: 999px;
            cursor: pointer;
            color: white;
            font-size: 22px;
            font-weight: 900;
            letter-spacing: 0.5px;
            background: linear-gradient(135deg, #00c6ff, #0072ff);
            box-shadow: 0 14px 36px rgba(0,114,255,0.35);
            transition: transform 0.25s ease, box-shadow 0.25s ease;
        }

        .explore-home-btn:hover {
            transform: translateY(-2px) scale(1.03);
            box-shadow: 0 18px 42px rgba(0,114,255,0.45);
        }

        /* Responsive typography and layout overrides */
        html {
            -webkit-text-size-adjust: 100%;
            text-size-adjust: 100%;
            scroll-behavior: smooth;
        }

        body {
            font-family: "Trebuchet MS", "Segoe UI", Arial, sans-serif;
            line-height: 1.5;
        }

        img {
            max-width: 100%;
            height: auto;
        }

        h1 {
            font-size: clamp(2.2rem, 9vw, 4.5rem);
            line-height: 1.05;
            letter-spacing: clamp(0.5px, 0.35vw, 2px);
        }

        .tagline {
            font-size: clamp(1rem, 4.2vw, 1.75rem);
            line-height: 1.35;
        }

        button,
        .explore-home-btn {
            font-size: clamp(1rem, 4vw, 1.75rem);
            padding: clamp(0.8rem, 2.6vw, 1.3rem) clamp(1rem, 4vw, 2.25rem);
            line-height: 1.1;
        }

        .button-container {
            gap: clamp(12px, 3vw, 30px);
            padding: clamp(20px, 4vw, 40px) 16px 20px;
        }

        .cars-grid {
            grid-template-columns: repeat(auto-fit, minmax(min(100%, 300px), 1fr));
            gap: clamp(18px, 4vw, 40px);
            padding: clamp(16px, 4vw, 60px);
        }

        .car-card {
            min-height: unset;
            padding: clamp(18px, 4vw, 30px);
        }

        .car-emoji {
            font-size: clamp(5rem, 18vw, 7.5rem);
            line-height: 1;
        }

        .car-name {
            font-size: clamp(1.5rem, 5vw, 2rem);
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .car-stat {
            font-size: clamp(1rem, 4vw, 1.5rem);
            padding: clamp(10px, 2.5vw, 14px) clamp(14px, 3vw, 20px);
        }

        .car-fact {
            font-size: clamp(0.95rem, 3.8vw, 1.2rem);
        }

        .car-description {
            font-size: clamp(0.9rem, 3.2vw, 1rem);
            line-height: 1.6;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .detail-view {
            padding: clamp(10px, 3vw, 24px);
        }

        .detail-card {
            padding: clamp(18px, 4vw, 28px);
            margin: clamp(18px, 5vw, 40px) auto;
        }

        .detail-hero {
            grid-template-columns: minmax(120px, 180px) 1fr;
            gap: clamp(14px, 3vw, 22px);
        }

        .detail-icon {
            width: clamp(120px, 35vw, 180px);
            height: clamp(120px, 35vw, 180px);
            font-size: clamp(4rem, 14vw, 6.8rem);
        }

        .detail-name {
            font-size: clamp(1.8rem, 7vw, 2.75rem);
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .detail-stat {
            font-size: clamp(1rem, 4.5vw, 1.5rem);
            padding: clamp(10px, 2.5vw, 12px) clamp(14px, 3vw, 18px);
        }

        .detail-fact {
            font-size: clamp(1rem, 4.2vw, 1.4rem);
            line-height: 1.35;
        }

        .detail-desc {
            font-size: clamp(0.95rem, 3.4vw, 1.1rem);
            line-height: 1.7;
            word-break: break-word;
            overflow-wrap: anywhere;
        }

        .footer-title {
            font-size: clamp(1.25rem, 4.5vw, 1.75rem);
        }

        .footer-subtitle {
            font-size: clamp(1rem, 3.8vw, 1.35rem);
        }

        @media (max-width: 768px) {
            .profile-corner {
                top: 10px;
                left: 10px;
                gap: 4px;
            }

            .profile-pic {
                width: 72px;
                max-height: 100px;
            }

            .profile-label {
                font-size: 11px;
                padding: 4px 9px;
            }

            .header-content {
                gap: 12px;
            }

            .landing-section {
                margin-top: 16px;
                padding: 0 14px;
            }

            .landing-actions {
                margin-top: 14px;
            }
        }

        @media (max-width: 480px) {
            header {
                padding: 20px 12px 24px;
            }

            h1 {
                font-size: clamp(2rem, 11vw, 3rem);
            }

            .tagline {
                font-size: clamp(0.95rem, 4.6vw, 1.2rem);
            }

            .button-container {
                flex-direction: column;
                align-items: center;
                padding-top: 18px;
            }

            button,
            .explore-home-btn {
                width: min(100%, 340px);
                justify-content: center;
            }

            .cars-grid {
                grid-template-columns: 1fr;
                padding: 16px 12px 36px;
            }

            .car-card {
                border-radius: 20px;
            }

            .car-description {
                padding: 14px 14px;
            }

            .detail-view {
                padding: 10px;
            }

            .detail-card {
                border-radius: 22px;
            }

            .detail-hero {
                grid-template-columns: 1fr;
                text-align: center;
            }

            .detail-icon {
                margin: 0 auto;
            }

            .back-btn,
            .close-btn {
                font-size: 16px;
                padding: 12px 14px;
            }

            footer {
                padding: 22px 16px;
            }
        }

        @media (max-width: 360px) {
            .profile-pic {
                width: 62px;
                max-height: 88px;
            }

            .car-card {
                padding: 16px;
            }

            .car-emoji {
                font-size: clamp(4.25rem, 20vw, 5.8rem);
            }

            .car-description,
            .detail-desc {
                font-size: 0.9rem;
            }
        }

    </style>
</head>

    <div class="stars" id="stars"></div>

    <header id="home">
        <div class="header-content">
            <span style="font-size: 60px;">🏎️</span>
            <h1>ANVIT CARS</h1>
            <span style="font-size: 60px;">🏆</span>
        </div>
        <p class="tagline">🏁 The Coolest Car Collection Ever! 🏁</p>
    </header>

    <div class="button-container" id="carsSection">
        <button class="btn-fastest active" onclick="showCategory('fastest')">
            <span>⚡</span>
            FASTEST CARS
        </button>
        <button class="btn-lowest" onclick="showCategory('lowest')">
            <span>⭐</span>
            LOWEST CARS
        </button>
    </div>

    <div class="cars-grid" id="carsGrid"></div>

    <div class="detail-view" id="detailView" aria-hidden="true">
        <div class="detail-card">
            <div class="detail-top">
                <button class="back-btn" onclick="goBack()">⬅ Back to Cars</button>
                <button class="close-btn" onclick="goBack()">✕ Close</button>
            </div>
            <div class="detail-hero">
                <div class="detail-icon" id="detailIcon">🏎️</div>
                <div>
                    <div class="detail-name" id="detailName">Car Name</div>
                    <div class="detail-stat" id="detailStat">Speed / Height</div>
                    <div class="detail-fact" id="detailFact">Fun fact</div>
                    <div class="detail-desc" id="detailDesc">Description</div>
                </div>
            </div>
        </div>
    </div>

    <footer>
        <p class="footer-title">🏆 ANVIT'S AWESOME CAR COLLECTION 🏆</p>
        <p class="footer-subtitle">Made with ❤️ for the biggest car fan!</p>
    </footer>

    <script>
        const fastestCars = [
            {
                name: "Bugatti Chiron",
                speed: "304 mph",
                image: "🏎️",
                color: "#FF4444",
                fact: "Fastest car in the world!",
                description: "Bugatti Chiron is a luxury hypercar built for extreme speed, smooth power delivery, and a premium driving experience. It is famous for its massive engine, incredible engineering, and super stylish design."
            },
            {
                name: "Koenigsegg Jesko",
                speed: "300 mph",
                image: "🏎️",
                color: "#FFD700",
                fact: "Swedish supercar beast!",
                description: "Koenigsegg Jesko is a high-performance machine made to push engineering limits. It has advanced aerodynamics, a lightweight body, and a design that looks like it came from the future."
            },
            {
                name: "Hennessey Venom F5",
                speed: "311 mph",
                image: "🏎️",
                color: "#00FF00",
                fact: "American speed demon!",
                description: "Hennessey Venom F5 is designed to chase record-breaking speed numbers. It combines powerful performance with a lightweight build so it can run at unbelievable top speeds."
            },
            {
                name: "SSC Tuatara",
                speed: "295 mph",
                image: "🏎️",
                color: "#FF6B00",
                fact: "Built for pure speed!",
                description: "SSC Tuatara focuses on aerodynamics and speed efficiency. Its low, sharp shape helps it slice through the air quickly while delivering a true supercar experience."
            },
            {
                name: "McLaren Speedtail",
                speed: "250 mph",
                image: "🏎️",
                color: "#4169E1",
                fact: "Sleek and super fast!",
                description: "McLaren Speedtail is a futuristic grand tourer with elegant curves and three seats. It is built to feel fast, smooth, and special on the road."
            },
            {
                name: "Lamborghini Aventador",
                speed: "217 mph",
                image: "🏎️",
                color: "#00FFFF",
                fact: "The raging bull!",
                description: "Lamborghini Aventador is known for its dramatic looks and loud, exciting personality. It is one of the most iconic supercars and always grabs attention wherever it goes."
            }
        ];

        const lowestCars = [
            {
                name: "Chevrolet Corvette C8",
                height: "48 inches",
                image: "🚗",
                color: "#FF0000",
                fact: "Super low sports car!",
                description: "Chevrolet Corvette C8 has a very low and sporty shape that helps it look fast even while standing still. Its mid-engine layout gives it balanced handling and a bold modern style."
            },
            {
                name: "Lamborghini Countach",
                height: "42 inches",
                image: "🚗",
                color: "#FFD700",
                fact: "Classic low rider!",
                description: "Lamborghini Countach became famous for its low body, sharp lines, and unforgettable supercar design. It is one of the most legendary cars in automotive history."
            },
            {
                name: "Ford GT",
                height: "44 inches",
                image: "🚗",
                color: "#0066FF",
                fact: "Le Mans champion!",
                description: "Ford GT is a race-inspired supercar made with performance in mind. Its low profile and aerodynamic shape help it stay fast and stable at high speed."
            },
            {
                name: "Ferrari F40",
                height: "44.5 inches",
                image: "🚗",
                color: "#FF0000",
                fact: "Legendary low Ferrari!",
                description: "Ferrari F40 is one of the most loved Ferrari models ever made. It is light, low, and raw, with a driving feel that made it a true icon."
            },
            {
                name: "Lotus Elise",
                height: "45 inches",
                image: "🚗",
                color: "#FFFF00",
                fact: "Tiny and super light!",
                description: "Lotus Elise is built to be light, nimble, and fun in corners. Its compact size and low height make it feel quick and playful."
            },
            {
                name: "Porsche 918 Spyder",
                height: "45 inches",
                image: "🚗",
                color: "#C0C0C0",
                fact: "Hybrid supercar!",
                description: "Porsche 918 Spyder combines hybrid technology with supercar performance. It has a low stance, advanced engineering, and a very futuristic feel."
            }
        ];

        let currentCategory = 'fastest';
        let currentCars = fastestCars;

        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 30; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                starsContainer.appendChild(star);
            }
        }

        function renderCars(cars, isFastest) {
            currentCars = cars;
            const grid = document.getElementById('carsGrid');
            grid.innerHTML = '';

            cars.forEach((car, index) => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.style.border = `5px solid ${car.color}`;
                card.style.boxShadow = `0 15px 50px ${car.color}40`;
                card.style.animationDelay = `${index * 0.1}s`;

                card.innerHTML = `
                    <div class="car-emoji" style="filter: drop-shadow(0 5px 15px ${car.color})">${car.image}</div>
                    <h2 class="car-name" style="color: ${car.color}; text-shadow: 0 0 20px ${car.color}">${car.name}</h2>
                    <div class="car-stat" style="background: ${car.color}; box-shadow: 0 5px 20px ${car.color}60">
                        ${isFastest ? `⚡ ${car.speed} ⚡` : `📏 ${car.height} 📏`}
                    </div>
                    <p class="car-fact">${car.fact}</p>
                    <div class="car-description">${car.description}</div>
                    <div class="shine" style="animation-delay: ${index * 0.2}s"></div>
                `;

                card.addEventListener('click', () => openDetails(car, isFastest));
                card.addEventListener('mouseenter', function() {
                    this.style.boxShadow = `0 25px 70px ${car.color}60`;
                });
                card.addEventListener('mouseleave', function() {
                    this.style.boxShadow = `0 15px 50px ${car.color}40`;
                });

                grid.appendChild(card);
            });
        }

        function openDetails(car, isFastest) {
            const detailView = document.getElementById('detailView');
            detailView.classList.add('show');
            detailView.setAttribute('aria-hidden', 'false');

            document.getElementById('detailIcon').textContent = car.image;
            document.getElementById('detailName').textContent = car.name;
            document.getElementById('detailName').style.color = car.color;
            document.getElementById('detailStat').textContent = isFastest ? `⚡ Top Speed: ${car.speed}` : `📏 Height: ${car.height}`;
            document.getElementById('detailStat').style.background = car.color;
            document.getElementById('detailFact').textContent = car.fact;
            document.getElementById('detailDesc').textContent = car.description;
            document.getElementById('detailIcon').style.boxShadow = `0 15px 40px ${car.color}60`;
            document.getElementById('detailIcon').style.borderColor = car.color;
        }

        function goBack() {
            const detailView = document.getElementById('detailView');
            detailView.classList.remove('show');
            detailView.setAttribute('aria-hidden', 'true');
        }

        function showCategory(category) {
            currentCategory = category;
            const fastestBtn = document.querySelector('.btn-fastest');
            const lowestBtn = document.querySelector('.btn-lowest');

            if (category === 'fastest') {
                fastestBtn.classList.add('active');
                lowestBtn.classList.remove('active');
                renderCars(fastestCars, true);
            } else {
                lowestBtn.classList.add('active');
                fastestBtn.classList.remove('active');
                renderCars(lowestCars, false);
            }
            goBack();
        }

        function exploreHome() {
            goBack();
            showCategory('fastest');
            const section = document.getElementById('carsSection');
            if (section) {
                section.scrollIntoView({ behavior: 'smooth', block: 'start' });
            }
        }

        document.getElementById('detailView').addEventListener('click', function(e) {
            if (e.target === this) goBack();
        });

        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape') goBack();
        });

        createStars();
        renderCars(fastestCars, true);
    </script>
</body>
