<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ANVIT CARS - The Coolest Car Collection!</title>
    <style>
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: 'Comic Sans MS', cursive, sans-serif;
            min-height: 100vh;
            background: linear-gradient(135deg, #1a1a2e 0%, #16213e 50%, #0f3460 100%);
            position: relative;
            overflow-x: hidden;
        }

        /* Animated background stars */
        .stars {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            pointer-events: none;
            z-index: 1;
        }

        .star {
            position: absolute;
            width: 3px;
            height: 3px;
            background: white;
            border-radius: 50%;
            animation: twinkle 3s infinite;
        }

        @keyframes twinkle {
            0%, 100% { opacity: 0.3; }
            50% { opacity: 1; }
        }

        /* Header */
        header {
            background: linear-gradient(90deg, #FF0000, #FF6B00, #FFD700);
            padding: 30px;
            text-align: center;
            position: relative;
            box-shadow: 0 10px 40px rgba(255, 107, 0, 0.5);
            border-bottom: 5px solid #FFD700;
            z-index: 10;
        }

        .header-content {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 20px;
            margin-bottom: 15px;
            flex-wrap: wrap;
        }

        h1 {
            font-size: 72px;
            font-weight: 900;
            color: #1a1a2e;
            text-shadow: 4px 4px 0px rgba(255, 255, 255, 0.3);
            letter-spacing: 2px;
            text-transform: uppercase;
        }

        .tagline {
            font-size: 28px;
            color: #1a1a2e;
            font-weight: bold;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.3);
        }

        /* Category Buttons */
        .button-container {
            display: flex;
            justify-content: center;
            gap: 30px;
            padding: 40px 20px;
            position: relative;
            z-index: 10;
            flex-wrap: wrap;
        }

        button {
            padding: 25px 50px;
            font-size: 32px;
            font-weight: 900;
            color: white;
            border-radius: 20px;
            cursor: pointer;
            transition: all 0.3s ease;
            display: flex;
            align-items: center;
            gap: 15px;
            text-transform: uppercase;
            font-family: 'Comic Sans MS', cursive;
        }

        button:hover {
            transform: scale(1.05) !important;
        }

        .btn-fastest {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border: 5px solid #7f8c8d;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-fastest.active {
            background: linear-gradient(135deg, #FF0000, #FF6B00);
            border: 5px solid #FFD700;
            box-shadow: 0 10px 40px rgba(255, 107, 0, 0.6);
            transform: scale(1.1);
        }

        .btn-lowest {
            background: linear-gradient(135deg, #2c3e50, #34495e);
            border: 5px solid #7f8c8d;
            box-shadow: 0 5px 20px rgba(0, 0, 0, 0.3);
        }

        .btn-lowest.active {
            background: linear-gradient(135deg, #00FFFF, #0066FF);
            border: 5px solid #FFD700;
            box-shadow: 0 10px 40px rgba(0, 255, 255, 0.6);
            transform: scale(1.1);
        }

        /* Cars Grid */
        .cars-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(350px, 1fr));
            gap: 40px;
            padding: 20px 60px 80px;
            max-width: 1600px;
            margin: 0 auto;
            position: relative;
            z-index: 10;
        }

        .car-card {
            background: linear-gradient(135deg, rgba(255, 255, 255, 0.1), rgba(255, 255, 255, 0.05));
            border-radius: 25px;
            padding: 30px;
            transition: all 0.4s ease;
            cursor: pointer;
            position: relative;
            overflow: hidden;
            backdrop-filter: blur(10px);
            animation: slideIn 0.6s ease-out backwards;
        }

        @keyframes slideIn {
            from {
                opacity: 0;
                transform: translateY(50px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .car-card:hover {
            transform: translateY(-15px) scale(1.05);
        }

        .car-emoji {
            font-size: 120px;
            text-align: center;
            margin-bottom: 20px;
            animation: bounce 2s ease-in-out infinite;
        }

        @keyframes bounce {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-10px); }
        }

        .car-name {
            font-size: 32px;
            font-weight: 900;
            text-align: center;
            margin: 0 0 15px 0;
            text-transform: uppercase;
        }

        .car-stat {
            color: #1a1a2e;
            font-size: 28px;
            font-weight: 900;
            padding: 15px 25px;
            border-radius: 15px;
            text-align: center;
            margin-bottom: 15px;
        }

        .car-fact {
            font-size: 22px;
            color: white;
            text-align: center;
            font-weight: bold;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.5);
        }

        .shine {
            position: absolute;
            top: 0;
            left: -100%;
            width: 50%;
            height: 100%;
            background: linear-gradient(90deg, transparent, rgba(255, 255, 255, 0.3), transparent);
            animation: shine 3s infinite;
        }

        @keyframes shine {
            0% { left: -100%; }
            50%, 100% { left: 150%; }
        }

        /* Footer */
        footer {
            background: linear-gradient(90deg, #FF0000, #FF6B00, #FFD700);
            padding: 30px;
            text-align: center;
            margin-top: 40px;
            border-top: 5px solid #FFD700;
            position: relative;
            z-index: 10;
        }

        .footer-title {
            font-size: 28px;
            font-weight: 900;
            color: #1a1a2e;
            text-shadow: 2px 2px 0px rgba(255, 255, 255, 0.3);
        }

        .footer-subtitle {
            font-size: 22px;
            color: #1a1a2e;
            margin-top: 10px;
            font-weight: bold;
        }

        .hidden {
            display: none;
        }

        /* Responsive */
        @media (max-width: 768px) {
            h1 { font-size: 48px; }
            .tagline { font-size: 20px; }
            button { font-size: 24px; padding: 20px 35px; }
            .cars-grid { grid-template-columns: 1fr; padding: 20px; }
        }
    </style>
</head>
<body>
    <!-- Background Stars -->
    <div class="stars" id="stars"></div>

    <!-- Header -->
    <header>
        <div class="header-content">
            <span style="font-size: 60px;">🏎️</span>
            <h1>ANVIT CARS</h1>
            <span style="font-size: 60px;">🏆</span>
        </div>
        <p class="tagline">🏁 The Coolest Car Collection Ever! 🏁</p>
    </header>

    <!-- Category Buttons -->
    <div class="button-container">
        <button class="btn-fastest active" onclick="showCategory('fastest')">
            <span>⚡</span>
            FASTEST CARS
        </button>
        <button class="btn-lowest" onclick="showCategory('lowest')">
            <span>⭐</span>
            LOWEST CARS
        </button>
    </div>

    <!-- Cars Grid -->
    <div class="cars-grid" id="carsGrid"></div>

    <!-- Footer -->
    <footer>
        <p class="footer-title">🏆 ANVIT'S AWESOME CAR COLLECTION 🏆</p>
        <p class="footer-subtitle">Made with ❤️ for the biggest car fan!</p>
    </footer>

    <script>
        // Car Data
        const fastestCars = [
            { name: "Bugatti Chiron", speed: "304 mph", image: "🏎️", color: "#FF4444", fact: "Fastest car in the world!" },
            { name: "Koenigsegg Jesko", speed: "300 mph", image: "🏎️", color: "#FFD700", fact: "Swedish supercar beast!" },
            { name: "Hennessey Venom F5", speed: "311 mph", image: "🏎️", color: "#00FF00", fact: "American speed demon!" },
            { name: "SSC Tuatara", speed: "295 mph", image: "🏎️", color: "#FF6B00", fact: "Built for pure speed!" },
            { name: "McLaren Speedtail", speed: "250 mph", image: "🏎️", color: "#4169E1", fact: "Sleek and super fast!" },
            { name: "Lamborghini Aventador", speed: "217 mph", image: "🏎️", color: "#00FFFF", fact: "The raging bull!" }
        ];

        const lowestCars = [
            { name: "Chevrolet Corvette C8", height: "48 inches", image: "🚗", color: "#FF0000", fact: "Super low sports car!" },
            { name: "Lamborghini Countach", height: "42 inches", image: "🚗", color: "#FFD700", fact: "Classic low rider!" },
            { name: "Ford GT", height: "44 inches", image: "🚗", color: "#0066FF", fact: "Le Mans champion!" },
            { name: "Ferrari F40", height: "44.5 inches", image: "🚗", color: "#FF0000", fact: "Legendary low Ferrari!" },
            { name: "Lotus Elise", height: "45 inches", image: "🚗", color: "#FFFF00", fact: "Tiny and super light!" },
            { name: "Porsche 918 Spyder", height: "45 inches", image: "🚗", color: "#C0C0C0", fact: "Hybrid supercar!" }
        ];

        let currentCategory = 'fastest';

        // Generate stars
        function createStars() {
            const starsContainer = document.getElementById('stars');
            for (let i = 0; i < 30; i++) {
                const star = document.createElement('div');
                star.className = 'star';
                star.style.top = Math.random() * 100 + '%';
                star.style.left = Math.random() * 100 + '%';
                star.style.animationDelay = Math.random() * 2 + 's';
                star.style.animationDuration = (2 + Math.random() * 3) + 's';
                starsContainer.appendChild(star);
            }
        }

        // Render cars
        function renderCars(cars, isFastest) {
            const grid = document.getElementById('carsGrid');
            grid.innerHTML = '';

            cars.forEach((car, index) => {
                const card = document.createElement('div');
                card.className = 'car-card';
                card.style.border = `5px solid ${car.color}`;
                card.style.boxShadow = `0 15px 50px ${car.color}40`;
                card.style.animationDelay = `${index * 0.1}s`;

                card.innerHTML = `
                    <div class="car-emoji" style="filter: drop-shadow(0 5px 15px ${car.color})">${car.image}</div>
                    <h2 class="car-name" style="color: ${car.color}; text-shadow: 0 0 20px ${car.color}">${car.name}</h2>
                    <div class="car-stat" style="background: ${car.color}; box-shadow: 0 5px 20px ${car.color}60">
                        ${isFastest ? `⚡ ${car.speed} ⚡` : `📏 ${car.height} 📏`}
                    </div>
                    <p class="car-fact">${car.fact}</p>
                    <div class="shine" style="animation-delay: ${index * 0.2}s"></div>
                `;

                card.addEventListener('mouseenter', function() {
                    this.style.boxShadow = `0 25px 70px ${car.color}60`;
                });

                card.addEventListener('mouseleave', function() {
                    this.style.boxShadow = `0 15px 50px ${car.color}40`;
                });

                grid.appendChild(card);
            });
        }

        // Show category
        function showCategory(category) {
            currentCategory = category;
            
            // Update buttons
            const fastestBtn = document.querySelector('.btn-fastest');
            const lowestBtn = document.querySelector('.btn-lowest');
            
            if (category === 'fastest') {
                fastestBtn.classList.add('active');
                lowestBtn.classList.remove('active');
                renderCars(fastestCars, true);
            } else {
                lowestBtn.classList.add('active');
                fastestBtn.classList.remove('active');
                renderCars(lowestCars, false);
            }
        }

        // Initialize
        createStars();
        renderCars(fastestCars, true);
    </script>
</body>
</html>
